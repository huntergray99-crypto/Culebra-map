<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map - Verified Fix</title>
    
    <!-- MANDATORY: You must include the FULL folder paths below -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* CSS FIX: Map must have a fixed height or it will be 0px (grey) */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { 
            height: 100vh !important; 
            width: 100vw !important; 
            background: #cbd5e0; 
        }
        /* Prevents GitHub themes from accidentally shrinking map tiles */
        .leaflet-container img { max-width: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize map - points to Culebra, PR
            var map = L.map('map').setView([18.31, -65.30], 13);

            // THE TILE FIX: Must use 'https' to avoid blocking on GitHub Pages
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            // Your Pins
            var locations = [
                { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
                { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
                { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
                { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
            ];

            // Add markers
            locations.forEach(function(p) {
                L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
            });

            // CRITICAL RENDER FIX: Forces the map to "wake up" after the page settles
            setTimeout(function() {
                map.invalidateSize();
                window.dispatchEvent(new Event('resize')); 
            }, 600);
        });
    </script>
</body>
</html>
