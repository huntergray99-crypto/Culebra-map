<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map - Final Fix</title>
    
    <!-- 1. Use HTTPS and full paths for Leaflet (Required for GitHub Pages) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        /* 2. Map MUST have a height. 100vh makes it fill the screen. */
        html, body, #map { 
            height: 100vh; 
            width: 100vw; 
            margin: 0; 
            padding: 0; 
        }
        /* Fix for GitHub themes that might squash map tiles */
        .leaflet-container img { max-width: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 3. Initialize map (L only works after script above loads)
        var map = L.map('map').setView([18.31, -65.30], 13);

        // 4. Use preferred HTTPS Tile URL (No subdomains required anymore)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // 5. Your Pins
        var locations = [
            { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
            { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
            { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
            { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
        ];

        locations.forEach(function(p) {
            L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
        });

        // 6. Force a redraw to fix common grey screen bug on load
        setTimeout(function() {
            map.invalidateSize();
        }, 500);
    </script>
</body>
</html>
