<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map - Final Fix</title>
    
    <!-- FIXED: Added full, specific paths to Leaflet files -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { 
            height: 100vh !important; 
            width: 100vw !important; 
            background: #cbd5e0; 
            z-index: 1; 
        }
        .leaflet-container img { max-width: none !important; max-height: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize map
            var map = L.map('map', {
                center: [18.31, -65.30],
                zoom: 13,
                zoomControl: true
            });

            // FIXED: Added missing "/" after .org so tiles can load
            L.tileLayer('https://tile.openstreetmap.org{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org">OpenStreetMap</a>'
            }).addTo(map);

            var locations = [
                { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
                { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
                { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
                { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
            ];

            locations.forEach(function(p) {
                L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
            });

            // Force refresh for GitHub Pages display
            setTimeout(function() {
                map.invalidateSize();
            }, 800);
        });
    </script>
</body>
</html>
