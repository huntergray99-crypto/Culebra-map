<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map</title>
    
    <!-- 1. THE BRAIN: These must be in the <head> to load the map software -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        /* 2. THE BOX: This forces the map to actually be visible */
        #map { height: 100vh; width: 100%; background: #ddd; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <!-- 3. THE CONTAINER: This is where the map will sit -->
    <div id="map"></div>

    <script>
        // 4. THE LOGIC: This script runs the map
        document.addEventListener('DOMContentLoaded', function() {
            // Setup the map view centered on Culebra
            var map = L.map('map').setView([18.31, -65.30], 13);

            // Load the actual map tiles from OpenStreetMap (HTTPS)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Your Locations
            var locations = [
                { 
                    name: "Culebra Ferry Terminal", 
                    lat: 18.301451, 
                    lng: -65.302530, 
                    desc: "Our beloved Ferry Terminal, please be sure to arrive 1 hour before departure to avoid delays!",
                },
                { 
    name: "Punta Soldado", 
    lat: 18.281876, 
    lng: -65.286575, 
    desc: "<img src='https://dynamic-media-cdn.tripadvisor.com' style='width:100%;border-radius:8px;margin-bottom:8px;'><br>Our southernmost beach, offering stunning sunset views, Vieques, and sometimes you can see Saint Croix in the distance! Make sure you have a Jeep, Bronco, or E-Bike! Golf Carts are strictly prohibited here as the road leading down to the beach is steep, rocky and unpaved. If you go with an E-Bike, make sure to grab one from <a href='https://www.todoculebra.com' target='_blank'>www.todoculebra.com</a>" 
},
              { 
    name: "Playa Datiles", 
    lat: 18.296597, 
    lng: -65.300179, 
    desc: "Most romantic beach in the Caribbean! Stellar views of Cayo Luis Peña, Vieques, and El Yunque on the main Island!<br><br>Make sure to rent a Jeep, a Bronco, or an E-Bike, as the terrain is very demanding, steep, and requires 4x4 or a capable E-Bike/E-Moped, such as those from <a href='https://www.todoculebra.com' target='_blank'>www.todoculebra.com</a>." 
},
                { 
                name: "Melones Beach", 
                lat: 18.303469, 
                lng: -65.310197, 
                desc: "Marine reserve reef snorkeling (fish everywhere!), turtles, rays, island views.<br><br><a href='https://bluewatercharters.com' target='_blank'>bluewatercharters.com</a>" 
            },
                { 
                name: "Playa Zoni", 
                lat: 18.319636, 
                lng: -65.254862, 
                desc: "A beautiful 15 minute drive from town, offering stunning views of Culebrita, Cayo Norte, and even Saint Thomas!! Beautiful walking beach with a wonderful secluded vibe." 
            },
                { 
                    name: "Playa Flamenco", 
                    lat: 18.331667, 
                    lng: -65.318056, 
                    desc: "Consistently voted one of the world's best beaches, WW2 tanks, white sands, crystal clear water, this is the premier Culebra destination" 
                },
             { 
    name: "Hector El Protector", 
    lat: 18.300682, 
    lng: -65.302170, 
    desc: "<img src='https://www.discoverpuertorico.com/sites/default/files/listing_images/profile/8059/Hector-El-Protector_69BCB335-5056-A36A-080F2CD5E9C0A166-69bcb26d5056a36_69bcb61d-5056-a36a-0867dfd14ace9c20.jpg' style='width:100%; border-radius:5px; margin-bottom:8px;'><br>Hector the Protector, our beloved guardian, protector of the island, and bringer of safe passage for those coming or going. Constructed in 2014 by Thomas Dambo, and reconstructed by locals in 2017 after Hurricane Maria, this is his 4th troll, his most famous include those in Seattle, and Amsterdam. Visit Hector today!" 
},



            ];

            // Add the Pins to the map
            locations.forEach(function(p) {
                L.marker([p.lat, p.lg || p.lng]).addTo(map)
                    .bindPopup("<b>" + p.name + "</b><br>" + (p.desc || ""));
            });
            
            // Final nudge for Safari
            setTimeout(function(){ map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
