<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Explorer</title>
    
    <!-- LEAFLET CORE -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <!-- SEARCH PLUGIN -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        html, body, #map { height: 100vh; width: 100%; margin: 0; padding: 0; background: #aad3df; }
        
        .leaflet-control-custom button {
            background: white !important; border: 2px solid rgba(0,0,0,0.2) !important;
            border-radius: 4px; width: 34px; height: 34px; cursor: pointer;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        
        .leaflet-popup-content { font-size: 14px; line-height: 1.4; width: 280px !important; }
        .leaflet-popup-content img { border-radius: 8px; margin-bottom: 8px; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // A. Setup Map Instance
            var map = L.map('map').setView([18.31, -65.30], 13);

            // B. Reliable Tiles (Primary HTTPS OSM)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            // C. All Your Locations Restored
            var locations = [
                { name: "Culebra Ferry Terminal", lat: 18.301451, lng: -65.302530, desc: "Arrive 1 hour early!" },
                { 
                    name: "Isla Culebrita", lat: 18.318654, lng: -65.227238, 
                    desc: "<img src='https://upload.wikimedia.org'>The Caribbean's last true virgin island! Book with <a href='https://www.gammyswatertours.com'>Gammy's</a>!" 
                },
                { 
                    name: "Punta Soldado", lat: 18.281876, lng: -65.286575, 
                    desc: "Sunset views. Jeep/E-Bike only! <a href='https://www.todoculebra.com'>todoculebra.com</a>" 
                },
                { name: "Playa Datiles", lat: 18.296597, lng: -65.300179, desc: "Most romantic beach! Requires 4x4 or a capable E-Bike." },
                { name: "Playa Melones", lat: 18.303469, lng: -65.310197, desc: "Marine reserve snorkeling. <a href='https://bluewatercharters.com'>bluewatercharters.com</a>" },
                { name: "Playa Zoni", lat: 18.319636, lng: -65.254862, desc: "Beautiful drive. Secluded vibe." },
                { name: "Playa Flamenco", lat: 18.331667, lng: -65.318056, desc: "Famous white sands and WW2 tanks." },
                { 
                    name: "Hector El Protector", lat: 18.300682, lng: -65.302170, 
                    desc: "<img src='https://www.discoverpuertorico.com'>Wooden troll guardian!" 
                }
            ];

            // D. Add Markers
            locations.forEach(function(p) {
                L.marker([p.lat, p.lng]).addTo(map).bindPopup("<b>" + p.name + "</b><br>" + p.desc);
            });

            // E. Search Bar
            L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

            // F. Home Button
            var HomeBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var div = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    div.innerHTML = '<button type="button" title="Home">🏠</button>';
                    div.onclick = function() { map.setView([18.31, -65.30], 13); };
                    return div;
                }
            });
            map.addControl(new HomeBtn());

            // G. Toggle Fullscreen
            var FSBtn = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function (map) {
                    var div = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    div.innerHTML = '<button type="button" title="Fullscreen">↕️</button>';
                    div.onclick = function() {
                        var elem = document.getElementById("map");
                        if (!document.fullscreenElement) { elem.requestFullscreen(); } 
                        else { document.exitFullscreen(); }
                    };
                    return div;
                }
            });
            map.addControl(new FSBtn());

            // FORCE RENDER
            setTimeout(() => { map.invalidateSize(); }, 500);
        });
    </script>
</body>
</html>
