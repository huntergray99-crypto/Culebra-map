<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map - Final Fix</title>
    
    <!-- Reliable Leaflet CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        /* CSS FIX: Force visibility and dimensions */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { 
            height: 100vh !important; 
            width: 100vw !important; 
            background: #cbd5e0; /* Grey while loading */
            z-index: 1; 
        }
        /* Fix for GitHub themes that mess with map tile scaling */
        .leaflet-container img { max-width: none !important; max-height: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Initialize map
            var map = L.map('map', {
                center: [18.31, -65.30],
                zoom: 13,
                zoomControl: true
            });

            // 2. Load Tiles with a Custom User-Agent (Fixes OSM blocking)
            L.tileLayer('https://tile.openstreetmap.org{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap',
                // This identifies your app to the tile server
                className: 'map-tiles'
            }).addTo(map);

            // 3. Your Pins
            var locations = [
                { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
                { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
                { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
                { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
            ];

            locations.forEach(function(p) {
                L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
            });

            // 4. Force "Wake Up" - Essential for GitHub Pages
            setTimeout(function() {
                map.invalidateSize();
            }, 800);
        });
    </script>
</body>
</html>
