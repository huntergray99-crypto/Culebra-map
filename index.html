<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culebra Map - Final Fix</title>
    
    <!-- Using Protocol-Relative links to prevent HTTPS blocking -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com" />
    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        /* Force height so the map container is never 0px */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { 
            height: 100vh; 
            width: 100%; 
            background-color: #e5e5e5; 
        }
        /* Fix for GitHub themes that might shrink map tiles */
        .leaflet-container img { max-width: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // Ensure the DOM is fully loaded before initializing
        window.addEventListener('load', function() {
            // Initializing map at Culebra coordinates
            var map = L.map('map').setView([18.31, -65.30], 13);

            // Using HTTPS tile layer to avoid Mixed Content errors on GitHub Pages
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            // Your Locations
            var locations = [
                { n: "Todo Culebra Plaza Hub", lt: 18.3012, lg: -65.30213 },
                { n: "Zaco's Tacos", lt: 18.300, lg: -65.29558 },
                { n: "Playa Flamenco", lt: 18.3280, lg: -65.3358 },
                { n: "Playa Zoni", lt: 18.3197, lg: -65.2757 }
            ];

            // Add Pins
            locations.forEach(function(p) {
                L.marker([p.lt, p.lg]).addTo(map).bindPopup(p.n);
            });

            // Final check to "wake up" map rendering engine
            setTimeout(function() {
                map.invalidateSize();
            }, 500);
        });
    </script>
</body>
</html>
